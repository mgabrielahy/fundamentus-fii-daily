name: Coletar FIIs do Fundamentus (undetected)

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  coleta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Chrome 122 (compatível)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip
          # Baixar Chrome 122 (versão estável)
          wget -q https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_122.0.6261.129-1_amd64.deb
          sudo dpkg -i google-chrome-stable_122.0.6261.129-1_amd64.deb || sudo apt-get install -y -f
          google-chrome --version

      - name: Instalar chromedriver 122
        run: |
          wget -q https://storage.googleapis.com/chrome-for-testing-public/122.0.6261.129/linux64/chromedriver-linux64.zip
          unzip chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python script.py
