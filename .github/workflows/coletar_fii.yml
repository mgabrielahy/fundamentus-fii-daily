name: Coletar Dados FIIs

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 8:00 BRT
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  coleta:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Instalar dependências
      run: |
        pip install --upgrade pip
        pip install requests pandas beautifulsoup4 lxml openpyxl html5lib
    
    - name: Executar script de coleta
      run: python script.py
      env:
        PYTHONUNBUFFERED: 1
    
    - name: Upload dos dados como artefato
      uses: actions/upload-artifact@v4
      with:
        name: dados-fii
        path: |
          *.csv
          *.json
          *.xlsx
          metadados.txt
        retention-days: 30
